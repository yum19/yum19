<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f2b"/>
      <stop offset="100%" stop-color="#141a3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2d06b"/><stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a8ecef"/><stop offset="100%" stop-color="#7fd4d9"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2a366"/><stop offset="100%" stop-color="#e8834e"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c9a0"/><stop offset="100%" stop-color="#8fae7d"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" rx="16" fill="url(#bg)"/>
  <text x="18" y="28" fill="#f2d06b" font-size="15" font-weight="700">Core Skills</text>

  <!-- Kubernetes 88% -->
  <text x="18" y="52" fill="#e8e9f5" font-size="10.5">Kubernetes</text>
  <rect x="130" y="42" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="42" height="10" rx="5" fill="url(#gold)">
    <animate attributeName="width" from="0" to="222" dur="1.1s" begin="0.05s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="52" fill="#f2d06b" font-size="10" font-weight="600" text-anchor="end">88%</text>

  <!-- Docker 90% -->
  <text x="18" y="76" fill="#e8e9f5" font-size="10.5">Docker</text>
  <rect x="130" y="66" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="66" height="10" rx="5" fill="url(#cyan)">
    <animate attributeName="width" from="0" to="227" dur="1.1s" begin="0.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="76" fill="#a8ecef" font-size="10" font-weight="600" text-anchor="end">90%</text>

  <!-- React / RN 84% -->
  <text x="18" y="100" fill="#e8e9f5" font-size="10.5">React / RN</text>
  <rect x="130" y="90" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="90" height="10" rx="5" fill="url(#ember)">
    <animate attributeName="width" from="0" to="212" dur="1.1s" begin="0.25s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="100" fill="#f2a366" font-size="10" font-weight="600" text-anchor="end">84%</text>

  <!-- Node / Spring 82% -->
  <text x="18" y="124" fill="#e8e9f5" font-size="10.5">Node / Spring</text>
  <rect x="130" y="114" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="114" height="10" rx="5" fill="url(#sage)">
    <animate attributeName="width" from="0" to="207" dur="1.1s" begin="0.35s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="124" fill="#b0c9a0" font-size="10" font-weight="600" text-anchor="end">82%</text>

  <!-- Azure / OpenStack 80% -->
  <text x="18" y="148" fill="#e8e9f5" font-size="10.5">Azure / OpenStack</text>
  <rect x="130" y="138" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="138" height="10" rx="5" fill="url(#gold)">
    <animate attributeName="width" from="0" to="202" dur="1.1s" begin="0.45s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="148" fill="#f2d06b" font-size="10" font-weight="600" text-anchor="end">80%</text>

  <!-- Python / ML 78% -->
  <text x="18" y="172" fill="#e8e9f5" font-size="10.5">Python / ML</text>
  <rect x="130" y="162" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="162" height="10" rx="5" fill="url(#cyan)">
    <animate attributeName="width" from="0" to="197" dur="1.1s" begin="0.55s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="172" fill="#a8ecef" font-size="10" font-weight="600" text-anchor="end">78%</text>

  <!-- CI/CD & Monitoring 76% -->
  <text x="18" y="196" fill="#e8e9f5" font-size="10.5">CI/CD &amp; Monitoring</text>
  <rect x="130" y="186" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="186" height="10" rx="5" fill="url(#ember)">
    <animate attributeName="width" from="0" to="191" dur="1.1s" begin="0.65s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="196" fill="#f2a366" font-size="10" font-weight="600" text-anchor="end">76%</text>

  <!-- Embedded / C++ 70% -->
  <text x="18" y="220" fill="#e8e9f5" font-size="10.5">Embedded / C++</text>
  <rect x="130" y="210" width="252" height="10" rx="5" fill="#1e2450"/>
  <rect x="130" y="210" height="10" rx="5" fill="url(#sage)">
    <animate attributeName="width" from="0" to="176" dur="1.1s" begin="0.75s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
  </rect>
  <text x="388" y="220" fill="#b0c9a0" font-size="10" font-weight="600" text-anchor="end">70%</text>

  <text x="18" y="278" fill="#5b6394" font-size="9.5">Cloud Computing Engineering &#183; ESPRIT</text>
</svg>
