<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f2b"/>
      <stop offset="100%" stop-color="#141a3d"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="300" rx="16" fill="url(#bgd)"/>
  <text x="18" y="28" fill="#f2d06b" font-size="15" font-weight="700">Tech Stack Focus</text>

  <!-- Donut: cx=110 cy=160 r=76, circumference = 477.5 -->
  <g transform="rotate(-90 110 160)">
    <circle cx="110" cy="160" r="76" fill="none" stroke="#1e2450" stroke-width="26"/>

    <!-- Cloud & DevOps 35% : len 167.1, start 0 -->
    <circle cx="110" cy="160" r="76" fill="none" stroke="#d4af37" stroke-width="26"
      stroke-dashoffset="0" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 477.5" to="167.1 477.5" dur="1s" begin="0.1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
    </circle>

    <!-- Backend 25% : len 119.4, start 167.1 -->
    <circle cx="110" cy="160" r="76" fill="none" stroke="#7fd4d9" stroke-width="26"
      stroke-dashoffset="-167.1" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 477.5" to="119.4 477.5" dur="1s" begin="0.35s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
    </circle>

    <!-- Frontend & Mobile 20% : len 95.5, start 286.5 -->
    <circle cx="110" cy="160" r="76" fill="none" stroke="#e8834e" stroke-width="26"
      stroke-dashoffset="-286.5" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 477.5" to="95.5 477.5" dur="1s" begin="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
    </circle>

    <!-- Machine Learning 10% : len 47.75, start 382 -->
    <circle cx="110" cy="160" r="76" fill="none" stroke="#8fae7d" stroke-width="26"
      stroke-dashoffset="-382" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 477.5" to="47.75 477.5" dur="1s" begin="0.8s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
    </circle>

    <!-- Languages & Tools 10% : len 47.75, start 429.75 -->
    <circle cx="110" cy="160" r="76" fill="none" stroke="#8891b5" stroke-width="26"
      stroke-dashoffset="-429.75" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 477.5" to="47.75 477.5" dur="1s" begin="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 .46 .45 .94"/>
    </circle>
  </g>

  <text x="110" y="155" fill="#f2d06b" font-size="22" font-weight="700" text-anchor="middle" opacity="0">
    8+
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
  </text>
  <text x="110" y="174" fill="#8891b5" font-size="10" text-anchor="middle" opacity="0">
    projects
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Legend -->
  <g font-size="11">
    <rect x="216" y="76" width="11" height="11" rx="3" fill="#d4af37"/>
    <text x="234" y="86" fill="#e8e9f5">Cloud &amp; DevOps &#183; 35%</text>

    <rect x="216" y="104" width="11" height="11" rx="3" fill="#7fd4d9"/>
    <text x="234" y="114" fill="#e8e9f5">Backend &#183; 25%</text>

    <rect x="216" y="132" width="11" height="11" rx="3" fill="#e8834e"/>
    <text x="234" y="142" fill="#e8e9f5">Frontend &amp; Mobile &#183; 20%</text>

    <rect x="216" y="160" width="11" height="11" rx="3" fill="#8fae7d"/>
    <text x="234" y="170" fill="#e8e9f5">Machine Learning &#183; 10%</text>

    <rect x="216" y="188" width="11" height="11" rx="3" fill="#8891b5"/>
    <text x="234" y="198" fill="#e8e9f5">Languages &amp; Tools &#183; 10%</text>
  </g>

  <text x="18" y="278" fill="#5b6394" font-size="9.5">TFAKADNI &#183; MedAssist AI &#183; FitLife &amp; more</text>
</svg>
