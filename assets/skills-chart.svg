  <text x="30" y="62" fill="#8891b5" font-size="12">Self-assessed proficiency</text>

  <!-- Bars -->
  <!-- track width max = 560, starting x = 240 -->

  <!-- Kubernetes 88 -->
  <text x="30" y="98" fill="#e8e9f5" font-size="13">Kubernetes</text>
